<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VFA Lab Client</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="client.css">
</head>

<body>

  <h1>VFA Policy Lab - Mini Client</h1>

  <div class="row">
    <label>Gateway URL</label>
    <input id="baseUrl" value="http://localhost:8080">
  </div>

  <div class="row">
    <label>Visa Token</label>
    <textarea id="token" rows="2" placeholder="The token goes here (optional)"></textarea>
  </div>

  <div class="row">
    <button onclick="issueToken()">Token request</button>
    <button onclick="revokeToken()">Token revocation</button>
  </div>

  <hr>

  <div class="row">
    <button onclick="callHello()">/api/hello call</button>
    <button onclick="callData()">/api/data call</button>
  </div>

  <h3>Response</h3>
  <pre id="output">{ }</pre>

  <div class="small">
    Tip: Without token SANDBOX, with token PROD.<br>
    After revocation, back to SANDBOX.
  </div>

  <script src="client.js"></script>
</body>

</html>
